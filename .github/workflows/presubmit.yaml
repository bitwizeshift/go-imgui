# yaml-language-server: $schema=https://json.schemastore.org/github-workflow.json
name: Presubmit

on:
  pull_request:
    branches:
      - master

jobs:
  build-and-test:
    name: Build and Test
    uses: ./.github/workflows/go-build-and-test.yaml
    permissions:
      contents: read
      id-token: write

  lint:
    name: Lint
    uses: ./.github/workflows/go-lint.yaml
    permissions:
      contents: read

  vulnerability-scanning:
    name: Vulnerability Scanning
    uses: ./.github/workflows/go-vulnerability-scanning.yaml
    permissions:
      contents: read
      security-events: write
      actions: read
