name: Promote branch
on:
  push:
    branches:
      - develop

# Allow only 1 promotion to occur at any given time, to prevent the possibility
# of multiple changes running at the same time and going in out-of-order.
concurrency:
  group: promote-master
  cancel-in-progress: true

permissions:
  # For reading and pushing the branch
  contents: write
  # ID Token needed for permissions for promotion
  id-token: write

jobs:
  build-and-test:
    name: Build and Test
    uses: ./.github/workflows/go-build-and-test.yaml

  validate-commits:
    name: Validate Commit Trailers
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        # A default (shallow) checkout is sufficient: the commit range is
        # resolved via the GitHub compare API, not local history.

      - name: Validate promoted commits
        env:
          GH_TOKEN: ${{ github.token }}
          repository: ${{ github.repository }}
          sha: ${{ github.sha }}
        run: |
          # compare/<base>...<head> returns the commits in <head> that are not
          # in <base> -- i.e. exactly the commits being promoted from master to
          # this develop HEAD. Messages are emitted NUL-delimited so multi-line
          # commit bodies are read back intact.
          failed=0
          while IFS= read -r -d '' message; do
            printf '%s' "${message}" \
              | scripts/validate-commit-trailers.sh --message-file - || failed=1
          done < <(
            gh api --paginate \
              "repos/${repository}/compare/master...${sha}" \
              --jq '.commits[].commit.message + "\u0000"'
          )
          exit "${failed}"

  promote:
    name: Promote to Master
    runs-on: ubuntu-latest
    needs: [build-and-test, validate-commits]
    if: success()

    environment:
      name: master
      url: ${{ github.server_url }}/${{ github.repository }}/tree/master

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Push
        id: update-branch
        run: |
          echo "new_sha1=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

          git fetch origin master
          git checkout master
          echo "old_sha1=$(git rev-parse HEAD)" >> "${GITHUB_OUTPUT}"

          git push origin ${{github.sha}}:master

      - name: Summarize Success
        if: success()
        env:
          prefix: |
            # ⏩ Accepted changes from `develop` into `master`
            [${{ github.sha }}](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
             is the new HEAD of `master`

            ## Summary

            Below are commits being promoted:
          old_sha1: ${{ steps.update-branch.outputs.old_sha1 }}
          new_sha1: ${{ steps.update-branch.outputs.new_sha1 }}
          commit_url_base: ${{ github.server_url }}/${{ github.repository }}/commit

        run: |
          sha1=$(git rev-parse --short HEAD)
          echo "${prefix}" >> "${GITHUB_STEP_SUMMARY}"

          echo "| SHA1 | Message |" >> "${GITHUB_STEP_SUMMARY}"
          echo "|------|---------|" >> "${GITHUB_STEP_SUMMARY}"
          git log                                                    \
            --pretty='format:| [`%h`](${commit_url_base}/%h) | %s |' \
            --no-show-signature                                      \
            ${old_sha1}..${new_sha1} >> "${GITHUB_STEP_SUMMARY}"
